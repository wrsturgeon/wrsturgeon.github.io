<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ site.title }} - {{ page.title }}{% else %}{{ site.title }}{% endif %}</title>
    <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | strip_newlines | escape_once }}">
    <script>
      (function() {
        var savedTheme = null;
        try {
          savedTheme = localStorage.getItem("theme");
        } catch (error) {
          savedTheme = null;
        }
        if (savedTheme === "light" || savedTheme === "dark") {
          document.documentElement.dataset.theme = savedTheme;
        }
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Inter+Tight:ital,wght@0,100..900;1,100..900&display=swap">
    <link rel="icon" href="{{ '/favicon.svg' | relative_url }}" type="image/svg+xml">
    <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
    <link rel="alternate" type="application/atom+xml" title="{{ site.title }}" href="{{ '/feed.xml' | relative_url }}">
  </head>
  <body{% if page.home_matrix %} class="page-has-matrix"{% endif %}>
    {% if page.home_matrix %}
      <div class="site-matrix" aria-hidden="true">
        <canvas class="site-matrix-canvas" data-home-matrix></canvas>
      </div>
    {% endif %}
    <header class="site-header">
      <div class="site-header-inner">
        <nav class="site-nav" aria-label="Primary">
          <a href="{{ '/about/' | relative_url }}">About</a>
          <a href="{{ '/writing/' | relative_url }}">Writing</a>
          <a href="{{ '/projects/' | relative_url }}">Projects</a>
        </nav>
        <div class="site-title-menu">
          <a class="site-title-link" href="{{ '/' | relative_url }}">{{ site.title }}</a>
          <button class="site-menu-toggle" type="button" aria-controls="site-menu-bar" aria-expanded="false" aria-label="Toggle navigation">
            <svg class="site-menu-dots" viewBox="0 0 24 8" aria-hidden="true" focusable="false">
              <circle cx="3.2" cy="4" r="2.64"></circle>
              <circle cx="12" cy="4" r="2.64"></circle>
              <circle cx="20.8" cy="4" r="2.64"></circle>
            </svg>
          </button>
        </div>
        <label class="theme-toggle" for="theme-toggle">
          <span>Dark</span>
          <span class="theme-toggle-control">
            <input id="theme-toggle" type="checkbox" aria-label="Toggle dark mode">
            <span class="theme-toggle-slider" aria-hidden="true"></span>
          </span>
        </label>
      </div>
    </header>
    <nav id="site-menu-bar" class="site-menu-bar" aria-label="Primary menu">
      <div class="site-menu-bar-inner">
        <a href="{{ '/about/' | relative_url }}">About</a>
        <a href="{{ '/writing/' | relative_url }}">Writing</a>
        <a href="{{ '/projects/' | relative_url }}">Projects</a>
      </div>
    </nav>
    <main>
      {{ content }}
    </main>
    <script>
      (function() {
        var root = document.documentElement;
        var toggle = document.getElementById("theme-toggle");
        var mediaQuery = window.matchMedia("(prefers-color-scheme: dark)");
        var portraitQuery = window.matchMedia("(orientation: portrait)");
        var header = document.querySelector(".site-header");
        var menuToggle = document.querySelector(".site-menu-toggle");
        var menuBar = document.getElementById("site-menu-bar");

        function getPreferredTheme() {
          var savedTheme = null;
          try {
            savedTheme = localStorage.getItem("theme");
          } catch (error) {
            savedTheme = null;
          }
          if (savedTheme === "light" || savedTheme === "dark") {
            return savedTheme;
          }
          return mediaQuery.matches ? "dark" : "light";
        }

        function applyTheme(theme) {
          root.dataset.theme = theme;
          toggle.checked = theme === "dark";
        }

        applyTheme(getPreferredTheme());

        toggle.addEventListener("change", function() {
          var theme = toggle.checked ? "dark" : "light";
          root.dataset.theme = theme;
          try {
            localStorage.setItem("theme", theme);
          } catch (error) {
            // Ignore storage failures and keep the session-local toggle behavior.
          }
        });

        mediaQuery.addEventListener("change", function(event) {
          var savedTheme = null;
          try {
            savedTheme = localStorage.getItem("theme");
          } catch (error) {
            savedTheme = null;
          }
          if (savedTheme !== "light" && savedTheme !== "dark") {
            applyTheme(event.matches ? "dark" : "light");
          }
        });

        function closeMenu() {
          if (!menuBar || !menuToggle) {
            return;
          }

          menuBar.classList.remove("is-visible");
          menuToggle.setAttribute("aria-expanded", "false");
        }

        if (header && menuToggle && menuBar) {
          menuToggle.addEventListener("click", function(event) {
            var isOpen = menuBar.classList.toggle("is-visible");
            menuToggle.setAttribute("aria-expanded", isOpen ? "true" : "false");
            event.stopPropagation();
          });

          menuBar.addEventListener("click", closeMenu);

          document.addEventListener("click", function(event) {
            if (!header.contains(event.target) && !menuBar.contains(event.target)) {
              closeMenu();
            }
          });

          document.addEventListener("keydown", function(event) {
            if (event.key === "Escape") {
              closeMenu();
            }
          });

          if ("addEventListener" in portraitQuery) {
            portraitQuery.addEventListener("change", function(event) {
              if (!event.matches) {
                closeMenu();
              }
            });
          } else if ("addListener" in portraitQuery) {
            portraitQuery.addListener(function(event) {
              if (!event.matches) {
                closeMenu();
              }
            });
          }
        }
      })();
    </script>
    {% if page.home_matrix %}
      <script src="{{ '/assets/js/home-matrix.js' | relative_url }}" defer></script>
    {% endif %}
  </body>
</html>
